name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build and test dependencies
        shell: bash
        run: |
          python scripts/install_release_dependencies.py --build-tools
          python -m pip install pytest

      - name: Locate CMake package prefixes
        id: cmake-prefix
        shell: bash
        run: |
          prefix="$(python - <<'PY'
          import pybind11
          import torch

          print(torch.utils.cmake_prefix_path + ";" + pybind11.get_cmake_dir())
          PY
          )"
          echo "value=${prefix}" >> "${GITHUB_OUTPUT}"

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -DMTLEARN_BUILD_TESTS=ON \
            -DMTLEARN_BUILD_PYTHON=ON \
            -DMTLEARN_WITH_TORCH=ON \
            -DMTLEARN_ENABLE_EMBED=OFF \
            -DPYTHON_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')" \
            -DCMAKE_PREFIX_PATH="${{ steps.cmake-prefix.outputs.value }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

      - name: Run Python tests
        shell: bash
        run: |
          export PYTHONPATH="${PWD}/mtlearn/python:${PWD}/build/mtlearn/bindings"
          python -m pytest -q -m "not gradcheck" mtlearn/tests/python
          python -m pytest -q -m gradcheck mtlearn/tests/python

      - name: Syntax and whitespace checks
        run: |
          python -m compileall -q mtlearn/python/mtlearn mtlearn/tests/python
          git diff --check
