name: Notebooks

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

concurrency:
  group: notebooks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-notebooks:
    name: Validate public notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build and notebook dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install build scikit-build-core setuptools-scm pybind11
          python -m pip install numpy opencv-python-headless scikit-learn pytest
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          else
            python -m pip install torch
          fi
          python -m pip install ipykernel nbformat papermill

      - name: Locate CMake package prefixes
        id: cmake-prefix
        shell: bash
        run: |
          prefix="$(python - <<'PY'
          import pybind11
          import torch

          print(torch.utils.cmake_prefix_path + ";" + pybind11.get_cmake_dir())
          PY
          )"
          echo "value=${prefix}" >> "${GITHUB_OUTPUT}"

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -DMTLEARN_BUILD_TESTS=ON \
            -DMTLEARN_BUILD_PYTHON=ON \
            -DMTLEARN_WITH_TORCH=ON \
            -DMTLEARN_ENABLE_EMBED=OFF \
            -DPYTHON_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')" \
            -DCMAKE_PREFIX_PATH="${{ steps.cmake-prefix.outputs.value }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Validate notebooks
        run: python scripts/validate_notebooks.py --bindings-dir build/mtlearn/bindings

      - name: Upload executed notebooks
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: notebook-validation-output
          path: /tmp/mtlearn-notebook-validation
          if-no-files-found: ignore
