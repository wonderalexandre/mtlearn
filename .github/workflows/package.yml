name: Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-distributions:
    name: Build Python distributions
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install build scikit-build-core setuptools-scm pybind11
          python -m pip install numpy opencv-python-headless scikit-learn
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          else
            python -m pip install torch
          fi

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel --outdir dist --no-isolation

      - name: Inspect sdist contents
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          archives = sorted(Path("dist").glob("mtlearn-*.tar.gz"))
          if len(archives) != 1:
              raise SystemExit(f"expected one sdist, found {archives}")

          forbidden = (
              "notebooks/",
              "dat/",
              "__pycache__",
              ".ipynb_checkpoints",
              "backend-internalization",
              "public-snapshot-checklist",
              "connected-filter-preprocessing",
              "research-roadmap",
          )
          with tarfile.open(archives[0]) as tf:
              names = sorted(tf.getnames())

          leaked = {
              pattern: [name for name in names if pattern in name]
              for pattern in forbidden
          }
          leaked = {pattern: matches for pattern, matches in leaked.items() if matches}
          if leaked:
              raise SystemExit(f"sdist contains forbidden files: {leaked}")
          print(f"checked {archives[0]} with {len(names)} entries")
          PY

      - name: Install wheel and run smoke test
        shell: bash
        run: |
          python -m venv --system-site-packages .venv-install
          .venv-install/bin/python -m pip install --upgrade pip
          .venv-install/bin/python -m pip install --no-deps --force-reinstall dist/mtlearn-*.whl
          .venv-install/bin/python - <<'PY'
          import numpy as np
          import torch

          import mtlearn
          from mtlearn import morphology
          from mtlearn.layers import ConnectedFilterPreprocessingLayer

          assert mtlearn.__version__ == "1.0.0"
          image = np.array([[1, 2], [3, 4]], dtype=np.uint8)
          tree = morphology.create_max_tree(image)
          attr_index, attr_values = morphology.compute_attributes(
              tree,
              [morphology.AttributeType.AREA],
          )
          assert attr_index["AREA"] == 0
          assert attr_values.shape[0] == tree.numInternalNodeSlots

          layer = ConnectedFilterPreprocessingLayer(
              in_channels=1,
              attributes_spec=[(morphology.AttributeType.AREA,)],
              tree_type="max-tree",
              device="cpu",
              scale_mode="none",
          )
          y = layer(torch.tensor([[[[1, 2], [3, 4]]]], dtype=torch.float32))
          assert y.shape == (1, 1, 2, 2)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: mtlearn-dist
          path: dist/*
          if-no-files-found: error
