name: Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-distributions:
    name: Build Python distributions
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        shell: bash
        run: python scripts/install_release_dependencies.py --build-tools

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel --outdir dist --no-isolation

      - name: Inspect sdist contents
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          archives = sorted(Path("dist").glob("mtlearn-*.tar.gz"))
          if len(archives) != 1:
              raise SystemExit(f"expected one sdist, found {archives}")

          forbidden = (
              "notebooks/",
              "dat/",
              "__pycache__",
              ".ipynb_checkpoints",
              "backend-internalization",
              "public-snapshot-checklist",
              "connected-filter-preprocessing",
              "research-roadmap",
          )
          with tarfile.open(archives[0]) as tf:
              names = sorted(tf.getnames())

          leaked = {
              pattern: [name for name in names if pattern in name]
              for pattern in forbidden
          }
          leaked = {pattern: matches for pattern, matches in leaked.items() if matches}
          if leaked:
              raise SystemExit(f"sdist contains forbidden files: {leaked}")
          print(f"checked {archives[0]} with {len(names)} entries")
          PY

      - name: Inspect wheel metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = sorted(Path("dist").glob("mtlearn-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {wheels}")

          with ZipFile(wheels[0]) as zf:
              metadata_name = next(
                  name for name in zf.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              metadata = zf.read(metadata_name).decode()

          if "Requires-Dist: numpy" not in metadata:
              raise SystemExit("missing NumPy dependency")
          if "numpy<2" in metadata or "numpy>=1.23,<2" in metadata:
              raise SystemExit("wheel metadata must not force NumPy below 2")
          PY

      - name: Install wheel and run smoke test
        shell: bash
        run: |
          python -m venv --system-site-packages .venv-install
          .venv-install/bin/python -m pip install --upgrade pip
          .venv-install/bin/python -m pip install --no-deps --force-reinstall dist/mtlearn-*.whl
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          .venv-install/bin/python scripts/smoke_test_release.py --expected-version "${version}"

      - name: Install wheel and run smoke test with latest Torch
        shell: bash
        run: |
          python -m venv .venv-install-latest
          .venv-install-latest/bin/python -m pip install --upgrade pip
          .venv-install-latest/bin/python scripts/install_release_dependencies.py --torch latest
          .venv-install-latest/bin/python -m pip install --no-deps --force-reinstall dist/mtlearn-*.whl
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          .venv-install-latest/bin/python scripts/smoke_test_release.py --expected-version "${version}"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: mtlearn-dist
          path: dist/*
          if-no-files-found: error
