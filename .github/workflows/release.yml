name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.version.outputs.package-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate tag and package version
        id: version
        shell: bash
        run: |
          package_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          metadata = tomllib.loads(Path("pyproject.toml").read_text())
          print(metadata["project"]["version"])
          PY
          )"
          echo "package-version=${package_version}" >> "${GITHUB_OUTPUT}"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${package_version}" ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${package_version}."
              exit 1
            fi
          fi

  build-sdist:
    name: Source distribution
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        shell: bash
        run: python scripts/install_release_dependencies.py --build-tools

      - name: Build sdist
        run: python -m build --sdist --outdir dist --no-isolation

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: release-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-linux-wheels:
    name: Linux manylinux wheels
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cibuildwheel==3.3.0"

      - name: Build manylinux wheels
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: "cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64 cp314-manylinux_x86_64"
          CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_BUILD_LINUX: "python {package}/scripts/install_release_dependencies.py --build-tools"
          CIBW_BEFORE_TEST_LINUX: "python {package}/scripts/install_release_dependencies.py"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel repair
            --exclude libc10.so
            --exclude libtorch.so
            --exclude libtorch_cpu.so
            --exclude libtorch_python.so
            -w {dest_dir} {wheel}
          CIBW_TEST_COMMAND: "python {package}/scripts/smoke_test_release.py --expected-version ${{ needs.validate-version.outputs.package-version }}"
        run: python -m cibuildwheel --platform linux --output-dir dist

      - name: Upload Linux wheels
        uses: actions/upload-artifact@v7
        with:
          name: release-wheel-linux-manylinux-x86_64
          path: dist/*.whl
          if-no-files-found: error

  build-native-wheels:
    name: Wheel (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: validate-version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - macos-15-intel
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        exclude:
          - os: macos-15-intel
            python-version: "3.13"
          - os: macos-15-intel
            python-version: "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build dependencies
        shell: bash
        run: python scripts/install_release_dependencies.py --build-tools

      - name: Build wheel
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: python -m build --wheel --outdir dist --no-isolation

      - name: Install wheel and run smoke test
        shell: bash
        run: |
          python -m venv --system-site-packages .venv-release
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            venv_python=".venv-release/Scripts/python.exe"
          else
            venv_python=".venv-release/bin/python"
          fi
          "${venv_python}" -m pip install --upgrade pip
          "${venv_python}" scripts/install_release_dependencies.py
          "${venv_python}" -m pip install --no-deps --force-reinstall dist/mtlearn-*.whl
          "${venv_python}" scripts/smoke_test_release.py --expected-version "${{ needs.validate-version.outputs.package-version }}"

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: release-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  check-distributions:
    name: Check distributions
    needs:
      - build-sdist
      - build-linux-wheels
      - build-native-wheels
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Inspect sdist contents
        shell: bash
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          archives = sorted(Path("dist").glob("mtlearn-*.tar.gz"))
          if len(archives) != 1:
              raise SystemExit(f"expected one sdist, found {archives}")

          forbidden = (
              "notebooks/",
              "dat/",
              "__pycache__",
              ".ipynb_checkpoints",
              "backend-internalization",
              "public-snapshot-checklist",
              "connected-filter-preprocessing",
              "research-roadmap",
          )
          with tarfile.open(archives[0]) as tf:
              names = sorted(tf.getnames())

          leaked = {
              pattern: [name for name in names if pattern in name]
              for pattern in forbidden
          }
          leaked = {pattern: matches for pattern, matches in leaked.items() if matches}
          if leaked:
              raise SystemExit(f"sdist contains forbidden files: {leaked}")
          print(f"checked {archives[0]} with {len(names)} entries")
          PY

      - name: Check package metadata
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python - <<'PY'
          from pathlib import Path

          bad = []
          for wheel in sorted(Path("dist").glob("*.whl")):
              platform_tag = wheel.stem.rsplit("-", 1)[-1]
              if platform_tag.startswith("linux_"):
                  bad.append(wheel.name)

          if bad:
              raise SystemExit(
                  "Linux wheels must use manylinux or musllinux platform tags: "
                  + ", ".join(bad)
              )
          PY
          python -m twine check dist/*

  github-release:
    name: GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate-version
      - check-distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release view "${TAG_NAME}" --json assets --jq '.assets[].name' |
              while IFS= read -r asset_name; do
                gh release delete-asset "${TAG_NAME}" "${asset_name}" --yes
              done
            gh release upload "${TAG_NAME}" dist/*
          else
            gh release create "${TAG_NAME}" dist/* --verify-tag --title "${TAG_NAME}" --generate-notes
          fi
